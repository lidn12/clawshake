# Clawshake node configuration
#
# Copy this file to ~/.clawshake/config.toml and uncomment the sections
# you want to configure. All settings are optional — an unconfigured node
# discovers peers only on the local network via mDNS.

[network]

# Bootstrap peers to dial on startup. These are typically relay/bootstrap
# nodes that help your node join the wider network.
#
# Without bootstrap peers the node operates in local-only mode — it will
# still discover peers on the same LAN via mDNS, but won't reach peers
# across the internet.
#
# Format: libp2p multiaddr with an embedded /p2p/<peer-id> component.
# You can specify both TCP and QUIC addresses for the same peer.
#
# To use the public clawshake relays, uncomment these lines:
#
# bootstrap = [
#   # Virginia (US East)
#   "/ip4/43.166.241.142/tcp/7474/p2p/12D3KooWPfjVhJYqj2V1cJqNTzzFnG19LN1ggKpTX6fdw2SKV3vP",
#   "/ip4/43.166.241.142/udp/7474/quic-v1/p2p/12D3KooWPfjVhJYqj2V1cJqNTzzFnG19LN1ggKpTX6fdw2SKV3vP",
#   # Tokyo (Asia)
#   "/ip4/43.167.199.188/tcp/7474/p2p/12D3KooWDRtC9K43jkTpgc6urj9Y85fy8oKe1ijNE7YGuuTbMe1m",
#   "/ip4/43.167.199.188/udp/7474/quic-v1/p2p/12D3KooWDRtC9K43jkTpgc6urj9Y85fy8oKe1ijNE7YGuuTbMe1m",
# ]
#
# To run a private network, point to your own relay node instead:
#
# bootstrap = [
#   "/ip4/<your-relay-ip>/tcp/7474/p2p/<your-relay-peer-id>",
# ]

# TCP port for inbound P2P connections. 0 means pick a random port.
# In relay-server mode this defaults to 7474 instead of 0.
#
# listen_port = 0

# Enable relay-server mode: this node will forward traffic between peers
# behind NAT.  Uses a fixed port (default 7474) and prints a copy-ready
# multiaddr banner on startup.
#
# relay_server = false

# Path to the Ed25519 keypair file (default ~/.clawshake/identity.key).
# Useful for running multiple nodes on the same machine during testing.
#
# identity_path = "/path/to/identity.key"

# ──────────────────────────────────────────────────────────────────────

[models]

# Model proxy — share your private LLMs over the P2P network, or access
# models from other peers.
#
# Point this at your local model server (Ollama, vLLM, llama.cpp, etc.).
# The server must expose an OpenAI-compatible API.
#
# Example for Ollama (default port 11434):
# endpoint = "http://127.0.0.1:11434"
#
# Example for vLLM:
# endpoint = "http://127.0.0.1:8000"

# Which models to advertise on the P2P network.
#
# - "all" (default) — share all models discovered from the backend
# - ["model1", "model2"] — share only specific models
# - "none" — don't share any models (proxy-only mode: access others' models)
#
# Examples:
# advertise = "all"
# advertise = ["llama3.2:latest", "deepseek-r1:14b"]
# advertise = "none"

# Port for the local OpenAI-compatible proxy server.
# Point your applications at http://127.0.0.1:{proxy_port}/v1
# Default: 11435 (deliberately one above Ollama's 11434 to avoid collision)
#
# proxy_port = 11435

# ──────────────────────────────────────────────────────────────────────

[tools]

# Built-in tool settings.
#
# The shell tool (cron_* and spawn are also always registered) runs
# commands in a non-interactive shell (cmd on Windows, sh on Unix).
# Dangerous patterns (rm -rf /, mkfs, shutdown, etc.) are blocked by a
# built-in deny list. Output is truncated at max_output_bytes.
#
# For web search / web fetch, use the Brave and Anthropic manifest entries
# in your manifests directory instead of built-in tools.

# ── Shell tool ──────────────────────────────────────────────────────────

# [tools.shell]

# Extra patterns to block in addition to the built-in deny list.
# Checked as case-insensitive substrings.
#
# blocked_patterns = ["deploy --force", "DROP TABLE"]

# Default timeout for shell commands in seconds. Agents can override this
# per-call up to a hard maximum of 300 seconds.
# Default: 30
#
# default_timeout_secs = 30

# Maximum combined stdout+stderr returned to the agent (in bytes).
# Output beyond this limit is truncated with a notice.
# Default: 1048576 (1 MB)
#
# max_output_bytes = 1048576

# ──────────────────────────────────────────────────────────────────────

[sandbox]

# Process-isolation defaults for tool execution.
#
# When enabled, the broker wraps child processes with the platform sandbox
# (seccomp+Landlock on Linux, Seatbelt on macOS, Job objects on Windows)
# unless the tool manifest explicitly opts out.
#
# Default: disabled (opt-in).
#
# enabled = false

# Default network policy for sandboxed processes.
# One of: "none" (block all), "allow" (unrestricted), "outbound_only".
# Default: "none"
#
# network = "none"

# Maximum resident memory in bytes (0 = unlimited).
# Default: 0
#
# memory_bytes = 0

# Maximum wall-clock runtime in seconds before the process is killed
# (0 = unlimited).
# Default: 0
#
# timeout_secs = 0

# Additional host paths to mount read-only in every sandbox.
# Default: []
#
# read_only_mounts = ["/usr/share/ca-certificates"]
