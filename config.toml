# Clawshake node configuration
#
# Copy this file to ~/.clawshake/config.toml and uncomment the sections
# you want to configure. All settings are optional — an unconfigured node
# discovers peers only on the local network via mDNS.

[network]

# Bootstrap peers to dial on startup. These are typically relay/bootstrap
# nodes that help your node join the wider network.
#
# Without bootstrap peers the node operates in local-only mode — it will
# still discover peers on the same LAN via mDNS, but won't reach peers
# across the internet.
#
# Format: libp2p multiaddr with an embedded /p2p/<peer-id> component.
# You can specify both TCP and QUIC addresses for the same peer.
#
# To use the public clawshake relays, uncomment these lines:
#
# bootstrap = [
#   # Virginia (US East)
#   "/ip4/43.166.241.142/tcp/7474/p2p/12D3KooWPfjVhJYqj2V1cJqNTzzFnG19LN1ggKpTX6fdw2SKV3vP",
#   "/ip4/43.166.241.142/udp/7474/quic-v1/p2p/12D3KooWPfjVhJYqj2V1cJqNTzzFnG19LN1ggKpTX6fdw2SKV3vP",
#   # Tokyo (Asia)
#   "/ip4/43.167.199.188/tcp/7474/p2p/12D3KooWDRtC9K43jkTpgc6urj9Y85fy8oKe1ijNE7YGuuTbMe1m",
#   "/ip4/43.167.199.188/udp/7474/quic-v1/p2p/12D3KooWDRtC9K43jkTpgc6urj9Y85fy8oKe1ijNE7YGuuTbMe1m",
# ]
#
# To run a private network, point to your own relay node instead:
#
# bootstrap = [
#   "/ip4/<your-relay-ip>/tcp/7474/p2p/<your-relay-peer-id>",
# ]
