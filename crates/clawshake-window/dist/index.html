<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>clawshake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0f0f13;
        }

        /* Disconnect indicator: tiny red dot bottom-right, invisible when ok */
        #status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            z-index: 9999;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #c66;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            font-size: 0;
        }

        #status.disconnected {
            opacity: 1;
        }

        /* Frame container: CSS grid that fills full viewport */
        .frame-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-auto-rows: 1fr;
            width: 100vw;
            height: 100vh;
            gap: 1px;
            background: #1a1a2a;
            /* gap colour */
        }

        /* Single frame: force single cell, no gap, no seam — truly edge-to-edge */
        .frame-container:has(.frame-wrapper:only-child) {
            gap: 0;
            background: transparent;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .frame-wrapper {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #0f0f13;
            position: relative;
        }

        /* Frame header: hidden in Tauri — OS window chrome is sufficient */
        .frame-header {
            display: none;
        }

        iframe {
            border: none;
            flex: 1;
            width: 100%;
            height: 100%;
            display: block;
        }

        .empty {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-family: system-ui;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="status" class="disconnected">connecting…</div>
    <div class="frame-container" id="frames">
        <div class="empty" id="empty-msg">Waiting for agent…</div>
    </div>
    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;

        let brokerPort = null;
        const frames = {};

        const _params = new URLSearchParams(location.search);
        const frameFilter = _params.get('frame');
        const windowFilter = _params.get('window');

        function accepts(fid, targetWindow) {
            if (frameFilter && frameFilter !== fid) return false;
            // Targeted frames only appear in their designated window.
            // Broadcast frames (targetWindow == null/undefined) appear everywhere.
            if (targetWindow && targetWindow !== windowFilter) return false;
            return true;
        }

        function sendToBroker(obj) {
            invoke('send_to_broker', { msg: JSON.stringify(obj) }).catch(() => { });
        }

        function handleMsg(msg) {
            if (msg.type === 'render') renderFrame(msg);
            else if (msg.type === 'push') pushToFrame(msg);
            else if (msg.type === 'close') closeFrame(msg.frame_id);
            else if (msg.type === 'snapshot_request') handleSnapshot(msg);
        }

        async function init() {
            try {
                brokerPort = await invoke('get_broker_port');
                document.getElementById('status').textContent = 'connected';
                document.getElementById('status').className = 'connected';
            } catch (e) {
                document.getElementById('status').textContent = 'error: ' + e;
                return;
            }

            await listen('broker-msg', (event) => {
                let msg;
                try {
                    msg = typeof event.payload === 'string' ? JSON.parse(event.payload) : event.payload;
                } catch { return; }
                handleMsg(msg);
            });

            // Request a replay of all existing frames — sent after the listener
            // is registered so no messages are missed.
            invoke('send_to_broker', { msg: JSON.stringify({ type: 'replay_request' }) }).catch(() => { });

            // client_ready returns any messages buffered before our listener
            // was registered — process them directly (no emit race).
            const pending = await invoke('client_ready');
            for (const raw of pending) {
                try { handleMsg(JSON.parse(raw)); } catch { }
            }
        }

        init().catch(console.error);

        // -- Frame management ------------------------------------------------

        function hideEmpty() {
            const el = document.getElementById('empty-msg');
            if (el) el.style.display = 'none';
        }

        function renderFrame({ frame_id, src, title, width, height, window: targetWindow }) {
            if (!accepts(frame_id, targetWindow)) return;
            hideEmpty();

            if (src && !src.startsWith('http') && brokerPort) {
                src = 'http://127.0.0.1:' + brokerPort + src;
            }

            let wrapper = frames[frame_id];
            if (wrapper) {
                const iframe = wrapper.querySelector('iframe');
                iframe.src = src;
                const t = wrapper.querySelector('.title');
                if (t) t.textContent = title || 'Agent UI';
                return;
            }

            wrapper = document.createElement('div');
            wrapper.className = 'frame-wrapper';
            wrapper.dataset.frameId = frame_id;

            const header = document.createElement('div');
            header.className = 'frame-header';
            header.innerHTML =
                '<span class="title">' + (title || 'Agent UI') + '</span>' +
                '<span class="close" title="Close">&times;</span>';
            header.querySelector('.close').onclick = () => {
                closeFrame(frame_id);
                sendToBroker({ type: 'close', frame_id });
            };

            const iframe = document.createElement('iframe');
            iframe.sandbox = 'allow-scripts allow-same-origin';
            iframe.src = src;

            wrapper.appendChild(header);
            wrapper.appendChild(iframe);
            document.getElementById('frames').appendChild(wrapper);
            frames[frame_id] = wrapper;

            window.addEventListener('message', function (e) {
                if (e.source !== iframe.contentWindow) return;
                if (!e.data || typeof e.data.event !== 'string') return;
                sendToBroker({
                    type: 'interaction', frame_id,
                    event: e.data.event,
                    id: e.data.id || '',
                    data: e.data.data || {}
                });
            });
        }

        function pushToFrame({ frame_id, data }) {
            if (!accepts(frame_id)) return;
            const w = frames[frame_id]; if (!w) return;
            const iframe = w.querySelector('iframe');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage(data, '*');
            }
        }

        function closeFrame(fid) {
            if (!accepts(fid)) return;
            const w = frames[fid];
            if (w) { w.remove(); delete frames[fid]; }
        }

        function handleSnapshot({ frame_id, format, request_id }) {
            if (!accepts(frame_id)) return;
            const w = frames[frame_id];
            if (!w) {
                sendToBroker({ type: 'snapshot_response', request_id, error: 'frame not found' });
                return;
            }
            const iframe = w.querySelector('iframe');
            // Try direct same-origin access first (browser mode).
            try {
                const result = format === 'html'
                    ? iframe.contentDocument.documentElement.outerHTML
                    : iframe.contentDocument.body.innerText;
                sendToBroker({ type: 'snapshot_response', request_id, result });
                return;
            } catch (_) { /* cross-origin — fall through to postMessage */ }
            // Cross-origin fallback: ask the frame via postMessage.
            // The frame bridge script responds with a snapshot_response message.
            let settled = false;
            const listener = function (e) {
                if (e.source !== iframe.contentWindow) return;
                if (!e.data || e.data.type !== 'snapshot_response') return;
                if (e.data.request_id !== request_id) return;
                if (settled) return;
                settled = true;
                window.removeEventListener('message', listener);
                if (e.data.error) {
                    sendToBroker({ type: 'snapshot_response', request_id, error: e.data.error });
                } else {
                    sendToBroker({ type: 'snapshot_response', request_id, result: e.data.result });
                }
            };
            window.addEventListener('message', listener);
            iframe.contentWindow.postMessage({ type: 'snapshot_request', request_id, format: format || 'text' }, '*');
            setTimeout(function () {
                if (settled) return;
                settled = true;
                window.removeEventListener('message', listener);
                sendToBroker({ type: 'snapshot_response', request_id, error: 'snapshot timed out' });
            }, 5000);
        }
    </script>
</body>

</html>
